name: Update Intervals Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest activities
        run: |
          curl -u "${{ secrets.INTERVALS_ATHLETE_ID }}:${{ secrets.INTERVALS_API_KEY }}" \
          https://intervals.icu/api/v1/athlete/${{ secrets.INTERVALS_ATHLETE_ID }}/activities \
          -o latest.json

      - name: Commit data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add latest.json
          git commit -m "Update training data" || echo "No changes"
          git push
