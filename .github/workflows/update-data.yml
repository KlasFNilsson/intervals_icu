name: Update Intervals Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest activities
        run: |
          curl -u "${{ secrets.INTERVALS_ATHLETE_ID }}:${{ secrets.INTERVALS_API_KEY }}" \
            "https://intervals.icu/api/v1/athlete/${{ secrets.INTERVALS_ATHLETE_ID }}/activities" \
            -o latest.json

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update training data" || echo "No changes to commit"
          git push
